# AI Governance Policy
# Control Owner: LOD1 — CTO Risk & Control
# Framework Reference: EU AI Act
# Review Cadence: Quarterly
# Last Reviewed: 2026-Q1

allowed_actions:
  - book_flight

blocked_actions:
  - cancel_all_flights
  - transfer_funds
  - send_email

risk_levels:
  book_flight: low
  cancel_all_flights: high
  transfer_funds: critical
  send_email: medium

rules:
  - name: Prevent Goal Hijacking
    description: Only allow actions aligned to original user intent
    enforcement: strict
    eu_ai_act_ref: Article 9 - Risk Management System
    control_owner: LOD1
    review_cadence: quarterly

  - name: Block High Risk Actions
    description: Prevent execution of high and critical risk actions without escalation
    enforcement: strict
    eu_ai_act_ref: Article 14 - Human Oversight
    control_owner: LOD1
    review_cadence: quarterly

  - name: Data Governance
    description: Ensure only permitted data actions are executed
    enforcement: strict
    eu_ai_act_ref: Article 10 - Data and Data Governance
    control_owner: LOD1
    review_cadence: quarterly

  - name: Audit Logging
    description: All decisions must be logged for traceability and auditability
    enforcement: strict
    eu_ai_act_ref: Article 12 - Record Keeping
    control_owner: LOD1
    review_cadence: quarterly